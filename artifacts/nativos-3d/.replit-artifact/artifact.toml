kind = "web"
previewPath = "/"
title = "Nativos 3D"
version = "1.0.0"
id = "artifacts/nativos-3d"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5000

[services.development]
run = "pnpm --filter @workspace/nativos-3d run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nativos-3d", "run", "build" ]
publicDir = "artifacts/nativos-3d/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5000"
BASE_PATH = "/"
